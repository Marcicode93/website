<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#08090d"/>
  <rect width="32" height="32" rx="7" stroke="rgba(56,189,248,0.2)" stroke-width="0.75"/>

  <!-- Accent glow -->
  <circle cx="25" cy="7" r="10" fill="url(#glow)"/>

  <!-- MS initials — matches navbar: MS. -->
  <text
    x="15"
    y="21.5"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13.5"
    font-weight="400"
    letter-spacing="-0.5"
  >
    <tspan fill="#f4f4f5">M</tspan><tspan fill="url(#accent)">S</tspan>
  </text>

  <!-- Amber dot accent -->
  <circle cx="24.5" cy="8" r="2.25" fill="#f59e0b"/>
</svg>
